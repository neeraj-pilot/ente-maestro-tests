appId: ${APP_ID}
name: Auth prepared TOTP account completes two-factor login
tags: [auth, android, online, fixture, totp]
---
- assertVisible: "Two-factor authentication"
- inputText: ${FIXTURE_TOTP_CODE}
- extendedWaitUntil:
    visible: "Settings"
    timeout: 60000
- runFlow:
    file: subflows/dismiss-code-guidance.yaml
    env:
      READY_ACCOUNT: security.fixture@example.org
- runFlow:
    file: subflows/assert-synced-code.yaml
    env:
      ISSUER: GitHub
      ACCOUNT: security.fixture@example.org
- tapOn: "Settings"
- tapOn: "Security"
- assertVisible: "Email verification"
- assertVisible: "App lock"
- runFlow:
    when:
      true: ${ASSERT_TWO_FACTOR_STATUS}
    commands:
      - extendedWaitUntil:
          visible:
            id: auth_security_two_factor_status
          timeout: 30000
      - assertVisible:
          id: auth_security_two_factor_status
          checked: true
