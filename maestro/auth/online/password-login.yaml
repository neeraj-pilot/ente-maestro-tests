appId: ${APP_ID}
name: Auth password login after signup
tags: [auth, android, online, login]
---
- runFlow:
    file: ../subflows/login-online-account.yaml
    env:
      LOGIN_EMAIL: ${ONLINE_EMAIL}
      LOGIN_PASSWORD: ${ONLINE_PASSWORD}
- runFlow:
    file: ../subflows/dismiss-code-guidance.yaml
    env:
      READY_ACCOUNT: ${ONLINE_CODE_ACCOUNT}
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: GitHub
      ACCOUNT: ${ONLINE_CODE_ACCOUNT}
