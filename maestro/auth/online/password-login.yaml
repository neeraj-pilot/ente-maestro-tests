appId: ${APP_ID}
name: Auth password login after signup
tags: [auth, android, online, login]
---
- launchApp:
    clearState: true
- assertVisible: "Log in"
- runFlow:
    file: ../subflows/configure-online-test-endpoint.yaml
- tapOn: "Log in"
- waitForAnimationToEnd
- eraseText: 100
- inputText: ${ONLINE_EMAIL}
- assertVisible: ${ONLINE_EMAIL}
- tapOn: "done"
- extendedWaitUntil:
    visible: ".*Enter the password for.*"
    timeout: 30000
- eraseText: 100
- inputText: ${ONLINE_PASSWORD}
- tapOn: "done"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 120000
