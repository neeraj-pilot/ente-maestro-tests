appId: ${APP_ID}
name: Auth applies a tag to two synced fixture codes
tags: [auth, android, online, fixture, sync, bulk]
---
- back
- back
- tapOn: "Work"
- assertVisible: GitHub
- assertVisible: Microsoft
- longPressOn: GitHub
- tapOn: ".*Select all.*"
- assertVisible: ".*2 selected.*"
- tapOn: ".*Add tag.*"
- assertVisible: "Add new"
- tapOn: "Add new"
- assertVisible: "Create new tag"
- inputText: ${FIXTURE_MUTATION_TAG}
- tapOn: "Create"
- tapOn: "Done"
- extendedWaitUntil:
    visible: ${FIXTURE_MUTATION_TAG}
    timeout: 30000
- tapOn: ${FIXTURE_MUTATION_TAG}
- assertVisible: GitHub
- assertVisible: Microsoft
