appId: ${APP_ID}
name: Auth shows an unknown-account login error
tags: [auth, android, online, login]
---
- launchApp:
    clearState: true
- assertVisible: "Log in"
- runFlow:
    file: ../subflows/configure-online-test-endpoint.yaml
- tapOn: "Log in"
- waitForAnimationToEnd
- inputText: ${MISSING_EMAIL}
- assertVisible: ${MISSING_EMAIL}
- tapOn: "done"
- extendedWaitUntil:
    visible: "Email not registered."
    timeout: 30000
