appId: ${APP_ID}
name: Auth signup and recovery key acknowledgement
tags: [auth, android, online, signup, recovery]
---
- launchApp:
    clearState: true
- assertVisible: "Log in"
- runFlow:
    file: subflows/configure-online-test-endpoint.yaml
- tapOn: "Sign up"
- assertVisible: "Enter your email id"
- tapOn: "Enter your email id"
- inputText: ${ONLINE_EMAIL}
- assertVisible: ${ONLINE_EMAIL}
- tapOn: "Enter your password"
- inputText: ${ONLINE_PASSWORD}
- tapOn: "Re-enter password"
- inputText: ${ONLINE_PASSWORD}
- hideKeyboard
- scrollUntilVisible:
    element: ".*I agree to the.*"
    direction: DOWN
    visibilityPercentage: 80
- tapOn:
    point: "6%,69%"
- tapOn: "Create account"
- extendedWaitUntil:
    visible: ".*We have sent a code to.*"
    timeout: 30000
- inputText: ${ONLINE_OTT}
# Account creation performs client-side key derivation on the x86_64 runner.
- extendedWaitUntil:
    visible: ".*If you forget your password.*"
    timeout: 300000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 120000
- runFlow:
    file: subflows/add-online-code.yaml
    env:
      ISSUER: GitHub
      SECRET: JBSWY3DPEHPK3PXP
      ACCOUNT: ${ONLINE_CODE_ACCOUNT}
