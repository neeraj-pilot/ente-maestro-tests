appId: ${APP_ID}
name: Auth signup, recovery key, and password login
tags: [auth, android, online, signup, recovery, login]
---
- launchApp:
    clearState: true
- assertVisible: "Log in"
- runFlow:
    file: ../subflows/configure-online-test-endpoint.yaml
- tapOn: "Sign up"
- assertVisible: "Enter your email id"
- tapOn: "Enter your email id"
- eraseText: 100
- inputText: ${ONLINE_EMAIL}
- assertVisible: ${ONLINE_EMAIL}
- tapOn: "Enter your password"
- eraseText: 100
- inputText: ${ONLINE_PASSWORD}
- tapOn: "Re-enter password"
- eraseText: 100
- inputText: ${ONLINE_PASSWORD}
- hideKeyboard
- scrollUntilVisible:
    element: ".*I agree to the.*"
    direction: DOWN
    visibilityPercentage: 80
- tapOn:
    point: "6%,69%"
- tapOn: "Create account"
- extendedWaitUntil:
    visible: ".*We have sent a code to.*"
    timeout: 30000
- inputText: ${ONLINE_OTT}
# Account creation performs client-side key derivation on the x86_64 runner.
- extendedWaitUntil:
    visible: ".*If you forget your password.*"
    timeout: 300000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 120000
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Account"
    timeout: 30000
- runFlow:
    when:
      visible:
        id: "auth_settings_account"
    commands:
      - tapOn:
          id: "auth_settings_account"
- waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Change email"
    commands:
      - tapOn: "Account"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Change email"
    timeout: 30000
- takeScreenshot: artifacts/maestro/account-settings
- runFlow:
    when:
      visible: "Logout"
    commands:
      - tapOn: "Logout"
- runFlow:
    when:
      notVisible: "Logout"
    commands:
      # The universal APK currently omits this row from x86_64 accessibility.
      - tapOn:
          point: "50%,43%"
- extendedWaitUntil:
    visible: "Yes, logout"
    timeout: 30000
- tapOn: "Yes, logout"
- extendedWaitUntil:
    visible: "Log in"
    timeout: 30000
- runFlow:
    file: ../subflows/configure-online-test-endpoint.yaml
- tapOn: "Log in"
- waitForAnimationToEnd
- eraseText: 100
- inputText: ${ONLINE_EMAIL}
- assertVisible: ${ONLINE_EMAIL}
- tapOn: "done"
- extendedWaitUntil:
    visible: ".*Enter the password for.*"
    timeout: 30000
- eraseText: 100
- inputText: ${ONLINE_PASSWORD}
- tapOn: "done"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 120000
