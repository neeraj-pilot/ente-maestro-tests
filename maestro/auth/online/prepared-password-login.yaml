appId: ${APP_ID}
name: Auth logs in to a prepared fixture account
tags: [auth, android, online, fixture, login]
---
- runFlow:
    file: ../subflows/login-online-account.yaml
    env:
      LOGIN_EMAIL: ${FIXTURE_BASIC_EMAIL}
      LOGIN_PASSWORD: ${FIXTURE_BASIC_PASSWORD}
- runFlow:
    file: ../subflows/dismiss-code-guidance.yaml
    env:
      READY_ACCOUNT: developer.fixture@example.org
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: GitHub
      ACCOUNT: developer.fixture@example.org
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: Google
      ACCOUNT: personal.fixture@example.org
- scrollUntilVisible:
    element: ".*billing.fixture@example.org.*"
    direction: DOWN
    timeout: 30000
- assertVisible: Microsoft
- assertVisible: ".*operations.fixture@example.org.*"
- assertVisible: Stripe
- assertVisible: ".*billing.fixture@example.org.*"
- tapOn: "Trash"
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: Dropbox
      ACCOUNT: archive.fixture@example.org
- tapOn: "All"
- tapOn: "Settings"
- tapOn: "Account"
- assertVisible: "Change password"
- assertVisible: "Recovery key"
- back
- tapOn: "Security"
- assertVisible: "Email verification"
- assertVisible: "App lock"
- runFlow:
    when:
      true: ${ASSERT_TWO_FACTOR_STATUS}
    commands:
      - extendedWaitUntil:
          visible:
            id: auth_security_two_factor_status
          timeout: 30000
      - assertVisible:
          id: auth_security_two_factor_status
          checked: false
