appId: ${APP_ID}
name: Auth checks a prepared fixture account
tags: [auth, android, online, fixture, login]
---
- runFlow:
    file: prepared-basic-login.yaml
    env:
      FIXTURE_BASIC_EMAIL: ${FIXTURE_BASIC_EMAIL}
      FIXTURE_BASIC_PASSWORD: ${FIXTURE_BASIC_PASSWORD}
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: GitHub
      ACCOUNT: developer.fixture@example.org
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: Microsoft
      ACCOUNT: operations.fixture@example.org
- tapOn: "Trash"
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: Dropbox
      ACCOUNT: archive.fixture@example.org
- tapOn: "All"
- tapOn: "Settings"
- tapOn: "Account"
- assertVisible: "Change password"
- assertVisible: "Recovery key"
- back
- tapOn: "Security"
- assertVisible: "Email verification"
- assertVisible: "App lock"
- runFlow:
    when:
      true: ${ASSERT_TWO_FACTOR_STATUS}
    commands:
      - extendedWaitUntil:
          visible:
            id: auth_security_two_factor_status
          timeout: 30000
      - assertVisible:
          id: auth_security_two_factor_status
          checked: false
