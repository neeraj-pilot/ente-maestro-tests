appId: ${APP_ID}
name: Auth logs in to a prepared fixture account
tags: [auth, android, online, fixture, login]
---
- launchApp:
    clearState: true
- assertVisible: "Log in"
- runFlow:
    file: ../subflows/configure-online-test-endpoint.yaml
- tapOn: "Log in"
- waitForAnimationToEnd
- eraseText: 100
- inputText: ${FIXTURE_BASIC_EMAIL}
- assertVisible: ${FIXTURE_BASIC_EMAIL}
- tapOn: "done"
- extendedWaitUntil:
    visible: ".*Enter the password for.*"
    timeout: 30000
- eraseText: 100
- inputText: ${FIXTURE_BASIC_PASSWORD}
- tapOn: "done"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 120000
- tapOn: "Settings"
- assertVisible:
    id: auth_settings_account
- tapOn:
    id: auth_settings_account
- assertVisible: "Change password"
- assertVisible: "Recovery key"
