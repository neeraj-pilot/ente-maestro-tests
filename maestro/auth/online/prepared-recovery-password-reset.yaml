appId: ${APP_ID}
name: Auth resets a prepared fixture password with its recovery key
tags: [auth, android, online, fixture, recovery]
---
- launchApp:
    clearState: true
- assertVisible: "Log in"
- runFlow:
    file: ../subflows/configure-online-test-endpoint.yaml
- tapOn: "Log in"
- waitForAnimationToEnd
- inputText: ${FIXTURE_RECOVERY_EMAIL}
- assertVisible: ${FIXTURE_RECOVERY_EMAIL}
- tapOn: "done"
- extendedWaitUntil:
    visible: ".*Enter the password for.*"
    timeout: 30000
- tapOn: "Forgot password?"
- extendedWaitUntil:
    visible: ".*We have sent a code to.*"
    timeout: 30000
- inputText: ${ONLINE_OTT}
- extendedWaitUntil:
    visible: "Recovery key"
    timeout: 30000
- tapOn: "Enter your recovery key"
- inputText: ${FIXTURE_RECOVERY_KEY}
- hideKeyboard
- tapOn: "Recover"
- extendedWaitUntil:
    visible: "Reset password"
    timeout: 120000
- tapOn:
    text: "Enter your password"
    index: 0
- inputText: ${FIXTURE_RECOVERED_PASSWORD}
- tapOn: "next"
- inputText: ${FIXTURE_RECOVERED_PASSWORD}
- hideKeyboard
- tapOn: "Reset password"
- extendedWaitUntil:
    visible: "Sign out from other devices"
    timeout: 30000
- tapOn: "Do not sign out"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 300000
- runFlow:
    file: ../subflows/dismiss-code-guidance.yaml
    env:
      READY_ACCOUNT: recovery.fixture@example.org
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: Google
      ACCOUNT: recovery.fixture@example.org
- launchApp:
    clearState: true
- assertVisible: "Log in"
- runFlow:
    file: ../subflows/configure-online-test-endpoint.yaml
- tapOn: "Log in"
- waitForAnimationToEnd
- inputText: ${FIXTURE_RECOVERY_EMAIL}
- tapOn: "done"
- extendedWaitUntil:
    visible: ".*Enter the password for.*"
    timeout: 30000
- inputText: ${FIXTURE_RECOVERY_PASSWORD}
- tapOn: "done"
- extendedWaitUntil:
    visible: "Incorrect password"
    timeout: 120000
- launchApp:
    clearState: true
- assertVisible: "Log in"
- runFlow:
    file: ../subflows/configure-online-test-endpoint.yaml
- tapOn: "Log in"
- waitForAnimationToEnd
- inputText: ${FIXTURE_RECOVERY_EMAIL}
- tapOn: "done"
- extendedWaitUntil:
    visible: ".*Enter the password for.*"
    timeout: 30000
- inputText: ${FIXTURE_RECOVERED_PASSWORD}
- tapOn: "done"
- extendedWaitUntil:
    visible: "Settings"
    timeout: 120000
- runFlow:
    file: ../subflows/dismiss-code-guidance.yaml
    env:
      READY_ACCOUNT: recovery.fixture@example.org
- runFlow:
    file: ../subflows/assert-synced-code.yaml
    env:
      ISSUER: Google
      ACCOUNT: recovery.fixture@example.org
