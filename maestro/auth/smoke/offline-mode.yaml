appId: io.ente.auth.independent
name: Enter Auth offline mode
tags:
  - auth
  - android
  - offline
  - smoke
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Use without backups"
    timeout: 60000
- tapOn: "Use without backups"
- assertVisible: "(?s)Warning.*You have chosen to proceed without backups.*"
- tapOn: "Ok"
- extendedWaitUntil:
    visible: "(?s)Setup your first.*account"
    timeout: 10000
- assertVisible: "Import codes"
