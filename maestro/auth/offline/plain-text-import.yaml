appId: io.ente.auth.independent
name: Import plain-text Auth codes offline
tags: [auth, android, offline, import]
---
- launchApp:
    clearState: true
- runFlow:
    file: ../subflows/enter-offline-mode.yaml
- tapOn: "Settings"
- tapOn: "Data"
- tapOn: "Import codes"
- tapOn:
    id: "auth_import_plainText"
- assertVisible: "Select file"
- tapOn: "Select file"
- tapOn: "Show roots"
- tapOn:
    text: "Downloads"
    index: 0
- tapOn:
    id: "com.google.android.documentsui:id/option_menu_search"
- extendedWaitUntil:
    visible: "Search…"
    timeout: 10000
- inputText: "plain_text_import.txt"
- extendedWaitUntil:
    visible: "^(?!Preview the file ).*plain_text_import.txt.*"
    timeout: 15000
- tapOn:
    id: "android:id/title"
- extendedWaitUntil:
    visible:
      id: "auth_import_success"
    timeout: 30000
- assertVisible: ".*imported 2 codes.*"
- tapOn: "Ok"
- pressKey: BACK
- pressKey: BACK
- assertVisible: "Settings"
- pressKey: BACK
- runFlow:
    when:
      visible: "Long press on a code to edit or remove."
    commands:
      - tapOn: "Ok"
- assertVisible: "GitHub"
- assertVisible: "Yubico"
