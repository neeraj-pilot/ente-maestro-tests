appId: io.ente.auth.independent
name: Add an offline account manually
tags:
  - auth
  - android
  - offline
  - core
---
- launchApp:
    clearState: true
- runFlow:
    file: ../subflows/enter-offline-mode.yaml
- tapOn: "Enter a setup key"
- extendedWaitUntil:
    visible: "Enter account details"
    timeout: 10000
- inputText: "GitHub"
- tapOn:
    rightOf: "Secret"
    below: "Issuer"
    above: "Account"
    width: 717
    tolerance: 80
- inputText: "JBSWY3DPEHPK3PXP"
- tapOn:
    rightOf: "Account"
    below: "Secret"
    above: "Notes"
    width: 717
    tolerance: 80
- inputText: "security@github.test"
- pressKey: enter
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
    visibilityPercentage: 60
    centerElement: true
- tapOn: "Save"
- extendedWaitUntil:
    visible: "GitHub"
    timeout: 10000
- assertVisible: ".*security@github.test.*"
