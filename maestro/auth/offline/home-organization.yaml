appId: io.ente.auth.independent
name: Organize offline accounts
tags:
  - auth
  - android
  - offline
  - core
---
- launchApp:
    clearState: true
- runFlow:
    file: ../subflows/enter-offline-mode.yaml
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "GitHub"
      SECRET: "JBSWY3DPEHPK3PXP"
      ACCOUNT: "security@octocat.test"
      NOTE: ""
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "Stripe"
      SECRET: "KRUGS4ZANFZSAYJA"
      ACCOUNT: "billing@rocket.test"
      NOTE: ""
- assertVisible:
    text: "GitHub"
    above:
      text: "Stripe"
- tapOn: "Search"
- inputText: "stripe"
- assertVisible: "Stripe"
- assertNotVisible: "GitHub"
- eraseText: 100
- inputText: "octocat"
- assertVisible: "GitHub"
- assertNotVisible: "Stripe"
- eraseText: 100
- inputText: "nothing-matches"
- assertVisible: "No result.*"
- eraseText: 100
- tapOn: "Search"
- assertVisible: "GitHub"
- assertVisible: "Stripe"
- runFlow:
    when:
      visible:
        id: "auth_sort_codes"
    commands:
      - tapOn:
          id: "auth_sort_codes"
- runFlow:
    when:
      notVisible: "Issuer"
    commands:
      # Published universal APKs before the sort semantics identifier shipped.
      - tapOn:
          point: "82%,9%"
- assertVisible: "Issuer"
- assertVisible: "Account"
- assertVisible: "Frequently used"
- assertVisible: "Recently used"
- assertVisible: "Custom"
- tapOn: "Account"
- assertVisible:
    text: "Stripe"
    above:
      text: "GitHub"
