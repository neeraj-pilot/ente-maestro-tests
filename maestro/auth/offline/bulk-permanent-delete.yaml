appId: io.ente.auth.independent
name: Permanently delete multiple offline accounts
tags: [auth, android, offline, trash]
---
- launchApp:
    clearState: true
- runFlow:
    file: ../subflows/enter-offline-mode.yaml
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "GitHub"
      SECRET: "JBSWY3DPEHPK3PXP"
      ACCOUNT: "security@github.test"
      NOTE: ""
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "Stripe"
      SECRET: "KRUGS4ZANFZSAYJA"
      ACCOUNT: "billing@stripe.test"
      NOTE: ""
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- longPressOn: "Stripe"
- assertVisible: "(?s)^2 selected.*"
- tapOn: "(?s)^Trash.*"
- tapOn: "^Trash$"
- assertVisible: "GitHub"
- assertVisible: "Stripe"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- longPressOn: "Stripe"
- assertVisible: "(?s)^2 selected.*"
- tapOn: "(?s)^Delete.*"
- tapOn: "^Delete$"
- assertNotVisible: "GitHub"
- assertNotVisible: "Stripe"
