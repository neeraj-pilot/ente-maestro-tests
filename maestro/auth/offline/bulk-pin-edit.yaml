appId: io.ente.auth.independent
name: Pin and unpin multiple offline accounts
tags: [auth, android, offline, organization]
---
- launchApp:
    clearState: true
- runFlow:
    file: ../subflows/enter-offline-mode.yaml
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "GitHub"
      SECRET: "JBSWY3DPEHPK3PXP"
      ACCOUNT: "security@github.test"
      NOTE: ""
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "Stripe"
      SECRET: "KRUGS4ZANFZSAYJA"
      ACCOUNT: "billing@stripe.test"
      NOTE: ""
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- tapOn: "(?s)^Select all.*"
- assertVisible: "(?s)^2 selected.*"
- assertVisible: "(?s)^Pin.*"
- tapOn: "(?s)^Pin.*"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- longPressOn: "Stripe"
- assertVisible: "(?s)^2 selected.*"
- assertVisible: "(?s)^Unpin.*"
- tapOn: "(?s)^Unpin.*"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- assertVisible: "(?s)^Pin.*"
- tapOn: "(?s)^Pin.*"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- longPressOn: "Stripe"
- assertVisible: "(?s)^2 selected.*"
- assertVisible: "(?s)^Pin.*"
- assertVisible: "(?s)^Unpin.*"
- tapOn: "(?s)^Unpin.*"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- assertVisible: "(?s)^Pin.*"
- tapOn: "(?s)^Pin.*"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- longPressOn: "Stripe"
- assertVisible: "(?s)^2 selected.*"
- assertVisible: "(?s)^Pin.*"
- assertVisible: "(?s)^Unpin.*"
- tapOn: "(?s)^Pin.*"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- longPressOn: "Stripe"
- assertVisible: "(?s)^2 selected.*"
- assertVisible: "(?s)^Unpin.*"
