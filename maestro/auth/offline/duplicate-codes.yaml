appId: io.ente.auth.independent
name: Inspect offline duplicate codes
tags: [auth, android, offline, data]
---
- launchApp:
    clearState: true
- runFlow:
    file: ../subflows/enter-offline-mode.yaml
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "GitHub"
      SECRET: "JBSWY3DPEHPK3PXP"
      ACCOUNT: "security@github.test"
      NOTE: ""
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "GitHub"
      SECRET: "JBSWY3DPEHPK3PXP"
      ACCOUNT: "security@github.test"
      NOTE: ""
- tapOn: "Settings"
- tapOn: "Data"
- tapOn: "Duplicate codes"
- assertVisible: "Deduplicate codes"
- assertVisible: ".*GitHub.*2.*"
- assertVisible: ".*security@github.test.*"
