appId: io.ente.auth.independent
name: Inspect and pin an offline code
tags:
  - auth
  - android
  - offline
  - core
---
- launchApp:
    clearState: true
- runFlow:
    file: ../subflows/enter-offline-mode.yaml
- runFlow:
    file: ../subflows/add-offline-account.yaml
    env:
      ISSUER: "GitHub"
      SECRET: "JBSWY3DPEHPK3PXP"
      ACCOUNT: "security@github.test"
      NOTE: "Primary admin account. Keep recovery contacts current."
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- runFlow:
    when:
      visible:
        id: "auth_selection_action_bar"
    commands:
      - assertVisible:
          id: "auth_selection_count"
- runFlow:
    when:
      visible: "Primary admin account. Keep recovery contacts current."
    commands:
      - tapOn: "Primary admin account. Keep recovery contacts current."
      - assertVisible:
          id: "auth_notes_sheet"
      - assertVisible: "Copy"
      - tapOn: "Close"
      - runFlow:
          when:
            visible:
              id: "auth_code_item"
          commands:
            - longPressOn:
                id: "auth_code_item"
      - runFlow:
          when:
            notVisible:
              id: "auth_code_item"
          commands:
            - longPressOn: "GitHub"
- assertVisible: "(?s)^Pin.*"
- assertVisible: "(?s)^Add tag.*"
- assertVisible: "(?s)^Trash.*"
- tapOn: "(?s)^Pin.*"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "auth_code_item"
    commands:
      - longPressOn:
          id: "auth_code_item"
- runFlow:
    when:
      notVisible:
        id: "auth_code_item"
    commands:
      - longPressOn: "GitHub"
- assertVisible: "(?s)^Unpin.*"
- tapOn: "(?s)^Unpin.*"
- assertVisible: ".*security@github.test.*"
