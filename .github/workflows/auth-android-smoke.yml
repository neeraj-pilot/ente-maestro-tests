name: "Auth Android smoke"

on:
    push:
        branches: [main]
        paths:
            - ".github/workflows/auth-android-smoke.yml"
            - "maestro/auth/**"
    pull_request:
        paths:
            - ".github/workflows/auth-android-smoke.yml"
            - "maestro/auth/**"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: auth-android-smoke-${{ github.ref }}
    cancel-in-progress: true

env:
    AUTH_APK_DIR: ${{ github.workspace }}/artifacts/auth
    MAESTRO_CLI_NO_ANALYTICS: 1
    MAESTRO_VERSION: 2.6.1

jobs:
    smoke:
        name: ${{ matrix.name }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Offline setup and validation
                      suite: setup
                      flows: maestro/auth/smoke/onboarding.yaml maestro/auth/smoke/offline-mode.yaml maestro/auth/offline/manual-setup.yaml maestro/auth/offline/manual-validation.yaml
                      coverage: onboarding, offline entry, manual setup, and field validation
                    - name: Offline lifecycle and organization
                      suite: organization
                      flows: maestro/auth/offline/code-lifecycle.yaml maestro/auth/offline/home-organization.yaml
                      coverage: code details and edits, issuer/account search, empty results, and sorting
                    - name: Offline settings
                      suite: settings
                      flows: maestro/auth/offline/settings.yaml
                      coverage: settings structure, General, About, Theme, and version label
                    - name: Offline tags
                      suite: tags
                      flows: maestro/auth/offline/tags.yaml
                      coverage: create a tag and filter the offline code list
                    - name: Offline trash
                      suite: trash
                      flows: maestro/auth/offline/trash-restore.yaml
                      coverage: trash and restore an offline code without permanent deletion
        steps:
            - name: Checkout tests
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Set up Java
              uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
              with:
                  distribution: temurin
                  java-version: 17

            - name: Download latest Auth nightly
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  mkdir -p "$AUTH_APK_DIR"
                  release_tag=$(gh api "repos/ente/nightly/releases?per_page=100" --jq '
                    [.[] | select(
                      .draft == false and
                      (.tag_name | startswith("auth-v")) and
                      (.tag_name | endswith("-beta"))
                    )] | max_by(.published_at).tag_name
                  ')
                  if [[ -z "$release_tag" || "$release_tag" == "null" ]]; then
                      echo "No Auth nightly release found" >&2
                      exit 1
                  fi
                  echo "Testing $release_tag"

                  gh release download "$release_tag" \
                      --repo ente/nightly \
                      --pattern "ente-auth-*.apk" \
                      --pattern SHA256SUMS \
                      --dir "$AUTH_APK_DIR"

                  apk_path=$(find "$AUTH_APK_DIR" -maxdepth 1 -type f -name "ente-auth-*.apk" -print -quit)
                  if [[ -z "$apk_path" ]]; then
                      echo "Auth APK was not downloaded" >&2
                      exit 1
                  fi

                  checksum=$(grep -E "  $(basename "$apk_path")$" "$AUTH_APK_DIR/SHA256SUMS")
                  (
                      cd "$AUTH_APK_DIR"
                      printf "%s\n" "$checksum" | sha256sum --check -
                  )

                  echo "AUTH_APK_PATH=$apk_path" >> "$GITHUB_ENV"
                  echo "AUTH_RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

            - name: Install Maestro
              run: |
                  curl -fsSL "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

            - name: Enable KVM
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

            - name: Run smoke tests
              id: smoke-tests
              continue-on-error: true
              uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
              with:
                  api-level: 34
                  target: default
                  arch: x86_64
                  profile: pixel_5
                  disable-animations: true
                  script: |
                      mkdir -p artifacts/maestro/debug
                      adb shell settings put system screen_off_timeout 2147483647
                      adb install -r "$AUTH_APK_PATH"
                      maestro test --no-ansi --format JUNIT --output artifacts/maestro/results.xml --debug-output artifacts/maestro/debug --flatten-debug-output ${{ matrix.flows }}

            - name: Summarize smoke tests
              if: always() && steps.smoke-tests.outcome != 'skipped'
              env:
                  TEST_OUTCOME: ${{ steps.smoke-tests.outcome }}
              run: |
                  if [[ "$TEST_OUTCOME" == "success" ]]; then
                      status="passed"
                  else
                      status="failed"
                  fi
                  {
                      echo "### Auth Android smoke $status"
                      echo
                      echo "- Release: \`$AUTH_RELEASE_TAG\`"
                      echo "- Suite: ${{ matrix.name }}"
                      echo "- Coverage: ${{ matrix.coverage }}"
                      echo "- Android API: \`34\`"
                      echo "- Maestro: \`$MAESTRO_VERSION\`"
                      if [[ "$TEST_OUTCOME" != "success" ]]; then
                          echo "- Diagnostics: see the \`auth-${{ matrix.suite }}-diagnostics\` artifact"
                      fi
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload Maestro results
              if: always() && steps.smoke-tests.outcome != 'skipped'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-${{ matrix.suite }}-results
                  path: artifacts/maestro/results.xml
                  if-no-files-found: warn
                  retention-days: 7

            - name: Upload Maestro diagnostics
              if: steps.smoke-tests.outcome == 'failure'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-${{ matrix.suite }}-diagnostics
                  path: |
                      artifacts/maestro/**
                      ~/.maestro/tests/**
                  if-no-files-found: warn
                  retention-days: 7

            - name: Propagate smoke test failure
              if: steps.smoke-tests.outcome == 'failure'
              run: exit 1
