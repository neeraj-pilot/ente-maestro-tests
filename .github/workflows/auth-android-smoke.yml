name: "Auth Android smoke"

on:
    push:
        branches: [main]
        paths:
            - ".github/workflows/auth-android-smoke.yml"
            - "maestro/auth/**"
            - "maestro/fixtures/**"
            - "scripts/resolve-auth-nightly.sh"
            - "scripts/select-auth-ci-suites.sh"
            - "scripts/test-select-auth-ci-suites.sh"
    pull_request:
        paths:
            - ".github/workflows/auth-android-smoke.yml"
            - "maestro/auth/**"
            - "maestro/fixtures/**"
            - "scripts/resolve-auth-nightly.sh"
            - "scripts/select-auth-ci-suites.sh"
            - "scripts/test-select-auth-ci-suites.sh"
    workflow_dispatch:
        inputs:
            suite:
                description: Offline suite to run
                required: true
                default: all
                type: choice
                options:
                    - all
                    - setup
                    - organization
                    - settings
                    - tags
                    - trash

permissions:
    contents: read

concurrency:
    group: auth-android-smoke-${{ github.ref }}
    cancel-in-progress: true

env:
    AUTH_APK_DIR: ${{ github.workspace }}/artifacts/auth
    MAESTRO_CLI_NO_ANALYTICS: 1
    MAESTRO_VERSION: 2.6.1
    MAESTRO_SHA256: 3440825f514f537c6a96bcf5de995780c2a4a7f83a43208fdc95d4f1fecfad3b

jobs:
    select:
        name: Select hosted Auth suites
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.select.outputs.matrix }}
            has_suites: ${{ steps.select.outputs.has_suites }}
            release_tag: ${{ steps.release.outputs.release_tag }}
            apk_name: ${{ steps.release.outputs.apk_name }}
            apk_sha256: ${{ steps.release.outputs.apk_sha256 }}
        steps:
            - name: Checkout tests
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Validate suite selection
              run: scripts/test-select-auth-ci-suites.sh

            - name: Select suites for this event
              id: select
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  HEAD_SHA: ${{ github.event.pull_request.head.sha }}
                  REQUESTED_SUITE: ${{ inputs.suite || 'all' }}
              run: |
                  if [[ "$EVENT_NAME" == "workflow_dispatch" && "$REQUESTED_SUITE" != "all" ]]; then
                      matrix="$(scripts/select-auth-ci-suites.sh --suite "$REQUESTED_SUITE")"
                  elif [[ "$EVENT_NAME" != "pull_request" ]]; then
                      matrix="$(scripts/select-auth-ci-suites.sh --all)"
                  else
                      matrix="$(scripts/select-auth-ci-suites.sh "$BASE_SHA" "$HEAD_SHA")"
                  fi
                  echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
                  if [[ "$(jq '.include | length' <<< "$matrix")" -gt 0 ]]; then
                      echo "has_suites=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "has_suites=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Resolve Auth nightly
              id: release
              if: steps.select.outputs.has_suites == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  scripts/resolve-auth-nightly.sh --github-output "$GITHUB_OUTPUT"

    smoke:
        needs: select
        if: needs.select.outputs.has_suites == 'true'
        name: ${{ matrix.name }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.select.outputs.matrix) }}
        steps:
            - name: Checkout tests
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Set up Java
              uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
              with:
                  distribution: temurin
                  java-version: 17

            - name: Download resolved Auth nightly
              env:
                  GH_TOKEN: ${{ github.token }}
                  AUTH_RELEASE_TAG: ${{ needs.select.outputs.release_tag }}
                  AUTH_APK_NAME: ${{ needs.select.outputs.apk_name }}
                  AUTH_APK_SHA256: ${{ needs.select.outputs.apk_sha256 }}
              run: |
                  mkdir -p "$AUTH_APK_DIR"
                  release_tag="$AUTH_RELEASE_TAG"
                  if [[ -z "$release_tag" || "$release_tag" == "null" || -z "$AUTH_APK_NAME" || -z "$AUTH_APK_SHA256" ]]; then
                      echo "Auth nightly release was not resolved" >&2
                      exit 1
                  fi
                  echo "Testing $release_tag ($AUTH_APK_NAME, $AUTH_APK_SHA256)"

                  gh release download "$release_tag" \
                      --repo ente/nightly \
                      --pattern "$AUTH_APK_NAME" \
                      --pattern SHA256SUMS \
                      --dir "$AUTH_APK_DIR"

                  apk_path="$AUTH_APK_DIR/$AUTH_APK_NAME"
                  if [[ ! -f "$apk_path" ]]; then
                      echo "Auth APK was not downloaded" >&2
                      exit 1
                  fi

                  expected_sha256="${AUTH_APK_SHA256#sha256:}"
                  actual_sha256=$(sha256sum "$apk_path" | awk '{print $1}')
                  if [[ "$actual_sha256" != "$expected_sha256" ]]; then
                      echo "Downloaded Auth APK does not match the resolved release asset" >&2
                      exit 1
                  fi

                  checksum=$(grep -E "^${expected_sha256}[[:space:]]+\\*?${AUTH_APK_NAME}$" "$AUTH_APK_DIR/SHA256SUMS")
                  if [[ -z "$checksum" ]]; then
                      echo "SHA256SUMS does not contain the resolved Auth APK" >&2
                      exit 1
                  fi
                  (
                      cd "$AUTH_APK_DIR"
                      printf "%s\n" "$checksum" | sha256sum --check -
                  )

                  echo "AUTH_APK_PATH=$apk_path" >> "$GITHUB_ENV"
                  echo "AUTH_RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
                  echo "AUTH_APK_SHA256=$expected_sha256" >> "$GITHUB_ENV"

            - name: Install pinned Maestro
              run: |
                  curl --fail --location --silent --show-error \
                      "https://github.com/mobile-dev-inc/maestro/releases/download/cli-$MAESTRO_VERSION/maestro.zip" \
                      --output "$RUNNER_TEMP/maestro.zip"
                  echo "$MAESTRO_SHA256  $RUNNER_TEMP/maestro.zip" | sha256sum --check -
                  mkdir -p "$HOME/.maestro"
                  unzip -q "$RUNNER_TEMP/maestro.zip" -d "$HOME/.maestro"
                  maestro_bin="$HOME/.maestro/maestro/bin/maestro"
                  installed_version="$("$maestro_bin" --version)"
                  if [[ "$installed_version" != "$MAESTRO_VERSION" ]]; then
                      echo "Expected Maestro $MAESTRO_VERSION, installed $installed_version" >&2
                      exit 1
                  fi
                  echo "$HOME/.maestro/maestro/bin" >> "$GITHUB_PATH"

            - name: Enable KVM
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

            - name: Run smoke tests
              id: smoke-tests
              continue-on-error: true
              uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
              with:
                  api-level: 34
                  target: default
                  arch: x86_64
                  profile: pixel_5
                  disable-animations: true
                  script: |
                      mkdir -p artifacts/maestro/debug
                      adb shell settings put system screen_off_timeout 2147483647
                      adb install -r "$AUTH_APK_PATH"
                      [ "${{ matrix.suite }}" != "imports" ] || adb push maestro/fixtures/plain_text_import.txt /sdcard/Download/plain_text_import.txt
                      [ "${{ matrix.suite }}" != "imports" ] || adb push maestro/fixtures/google_auth_migration.png /sdcard/Download/google_auth_migration.png
                      maestro test --no-ansi --format JUNIT --output artifacts/maestro/results.xml --debug-output artifacts/maestro/debug --flatten-debug-output ${{ matrix.flows }}

            - name: Summarize smoke tests
              if: always() && steps.smoke-tests.outcome != 'skipped'
              env:
                  TEST_OUTCOME: ${{ steps.smoke-tests.outcome }}
              run: |
                  if [[ "$TEST_OUTCOME" == "success" ]]; then
                      status="passed"
                  else
                      status="failed"
                  fi
                  {
                      echo "### Auth Android smoke $status"
                      echo
                      echo "- Release: \`$AUTH_RELEASE_TAG\`"
                      echo "- Auth APK SHA-256: \`$AUTH_APK_SHA256\`"
                      echo "- Suite: ${{ matrix.name }}"
                      echo "- Coverage: ${{ matrix.coverage }}"
                      echo "- Android API: \`34\`"
                      echo "- Maestro: \`$MAESTRO_VERSION\`"
                      if [[ "$TEST_OUTCOME" != "success" ]]; then
                          echo "- Diagnostics: see the \`auth-${{ matrix.suite }}-diagnostics\` artifact"
                      fi
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload Maestro results
              if: always() && steps.smoke-tests.outcome != 'skipped'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-${{ matrix.suite }}-results
                  path: artifacts/maestro/results.xml
                  if-no-files-found: warn
                  retention-days: 7

            - name: Upload Maestro diagnostics
              if: steps.smoke-tests.outcome == 'failure'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-${{ matrix.suite }}-diagnostics
                  path: |
                      artifacts/maestro/**
                      ~/.maestro/tests/**
                  if-no-files-found: warn
                  retention-days: 7

            - name: Propagate smoke test failure
              if: steps.smoke-tests.outcome == 'failure'
              run: exit 1
