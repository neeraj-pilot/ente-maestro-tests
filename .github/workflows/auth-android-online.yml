name: "Auth Android online"

on:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: auth-android-online-${{ github.ref }}
    cancel-in-progress: true

env:
    APP_ID: io.ente.auth.independent
    AUTH_APK_DIR: ${{ github.workspace }}/artifacts/auth
    MAESTRO_CLI_NO_ANALYTICS: 1
    MAESTRO_VERSION: 2.6.1
    ONLINE_ENDPOINT: http://10.0.2.2:8080
    ONLINE_OTT: 123456
    ONLINE_EMAIL: auth-ci-${{ github.run_id }}-${{ github.run_attempt }}@example.org
    MISSING_EMAIL: missing-${{ github.run_id }}-${{ github.run_attempt }}@example.org

jobs:
    auth-online:
        name: Auth signup, recovery key, and password login
        runs-on: ubuntu-latest
        timeout-minutes: 40
        steps:
            - name: Checkout tests
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Set up Java
              uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
              with:
                  distribution: temurin
                  java-version: 17

            - name: Download latest Auth nightly
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  mkdir -p "$AUTH_APK_DIR"
                  release_tag=$(gh api "repos/ente/nightly/releases?per_page=100" --jq '
                    [.[] | select(
                      .draft == false and
                      (.tag_name | startswith("auth-v")) and
                      (.tag_name | endswith("-beta"))
                    )] | max_by(.published_at).tag_name
                  ')
                  if [[ -z "$release_tag" || "$release_tag" == "null" ]]; then
                      echo "No Auth nightly release found" >&2
                      exit 1
                  fi
                  echo "Testing $release_tag"

                  gh release download "$release_tag" \
                      --repo ente/nightly \
                      --pattern "ente-auth-*.apk" \
                      --pattern SHA256SUMS \
                      --dir "$AUTH_APK_DIR"

                  apk_path=$(find "$AUTH_APK_DIR" -maxdepth 1 -type f -name "ente-auth-*.apk" -print -quit)
                  if [[ -z "$apk_path" ]]; then
                      echo "Auth APK was not downloaded" >&2
                      exit 1
                  fi

                  checksum=$(grep -E "  $(basename "$apk_path")$" "$AUTH_APK_DIR/SHA256SUMS")
                  (
                      cd "$AUTH_APK_DIR"
                      printf "%s\n" "$checksum" | sha256sum --check -
                  )

                  echo "AUTH_APK_PATH=$apk_path" >> "$GITHUB_ENV"
                  echo "AUTH_RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

            - name: Install Maestro
              run: |
                  curl -fsSL "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

            - name: Start local Auth backend
              run: |
                  docker compose -f museum/compose.yaml up --detach
                  for attempt in {1..60}; do
                      if curl -fsS http://127.0.0.1:8080/ping > /dev/null 2>&1; then
                          exit 0
                      fi
                      sleep 1
                  done
                  docker compose -f museum/compose.yaml ps
                  exit 1

            - name: Enable KVM
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

            - name: Prepare private test password
              run: |
                  password=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 20)
                  echo "::add-mask::$password"
                  echo "ONLINE_PASSWORD=$password" >> "$GITHUB_ENV"

            - name: Run Auth online tests
              id: online-tests
              continue-on-error: true
              uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
              with:
                  api-level: 34
                  target: default
                  arch: x86_64
                  profile: pixel_5
                  cores: 4
                  disable-animations: true
                  script: .github/scripts/run-auth-online-tests.sh

            - name: Summarize Auth online tests
              if: always() && steps.online-tests.outcome != 'skipped'
              env:
                  TEST_OUTCOME: ${{ steps.online-tests.outcome }}
              run: |
                  if [[ "$TEST_OUTCOME" == "success" ]]; then
                      status="passed"
                  else
                      status="failed"
                  fi
                  {
                      echo "### Auth Android online $status"
                      echo
                      echo "- Release: \`$AUTH_RELEASE_TAG\`"
                      echo "- Android API: \`34\`"
                      echo "- Maestro: \`$MAESTRO_VERSION\`"
                      echo "- Backend dependency: local Museum with PostgreSQL"
                      echo
                      echo "#### Coverage in this run"
                      echo
                      echo "- Unknown-account login shows the expected Auth error"
                      echo "- Signup with deterministic email verification"
                      echo "- Recovery key is generated and acknowledged"
                      echo "- Logout clears the custom endpoint"
                      echo "- Password login succeeds after endpoint reconfiguration"
                      echo
                      echo "JUnit results are attached as \`auth-online-results\`."
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload Auth online results
              if: always() && steps.online-tests.outcome != 'skipped'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-online-results
                  path: artifacts/maestro/online-results.xml
                  if-no-files-found: warn
                  retention-days: 7

            - name: Upload filtered Account accessibility dump on failure
              if: steps.online-tests.outcome == 'failure'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-account-settings-hierarchy
                  path: artifacts/maestro/account-settings-hierarchy.txt
                  if-no-files-found: warn
                  retention-days: 1

            - name: Upload Auth emulator metrics on failure
              if: steps.online-tests.outcome == 'failure'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-emulator-metrics
                  path: artifacts/maestro/device-metrics.txt
                  if-no-files-found: warn
                  retention-days: 1

            - name: Show backend status on failure
              if: steps.online-tests.outcome == 'failure'
              run: docker compose -f museum/compose.yaml ps

            - name: Propagate Auth online test failure
              if: steps.online-tests.outcome == 'failure'
              run: exit 1
