name: "Auth Android online"

on:
    workflow_dispatch:
        inputs:
            lane:
                description: Online suite to run
                required: true
                default: all
                type: choice
                options:
                    - all
                    - account-auth
                    - recovery-password
                    - data-sync
    pull_request:
        paths:
            - ".github/scripts/run-auth-online-tests.sh"
            - ".github/workflows/auth-android-online.yml"
            - "maestro/auth/online/**"
            - "museum/**"
            - "scripts/current-totp.mjs"
            - "scripts/fixtures/**"
            - "scripts/resolve-auth-nightly.sh"
            - "scripts/select-auth-online-lanes.sh"
            - "scripts/test-select-auth-online-lanes.sh"
    push:
        branches: [main]
        paths:
            - ".github/scripts/run-auth-online-tests.sh"
            - ".github/workflows/auth-android-online.yml"
            - "maestro/auth/online/**"
            - "museum/**"
            - "scripts/current-totp.mjs"
            - "scripts/fixtures/**"
            - "scripts/resolve-auth-nightly.sh"
            - "scripts/select-auth-online-lanes.sh"
            - "scripts/test-select-auth-online-lanes.sh"

permissions:
    contents: read

concurrency:
    group: auth-android-online-${{ github.ref }}
    cancel-in-progress: true

env:
    APP_ID: io.ente.auth.independent
    AUTH_APK_DIR: ${{ github.workspace }}/artifacts/auth
    MAESTRO_CLI_NO_ANALYTICS: 1
    MAESTRO_VERSION: 2.6.1
    MAESTRO_SHA256: 3440825f514f537c6a96bcf5de995780c2a4a7f83a43208fdc95d4f1fecfad3b
    ONLINE_ENDPOINT: http://10.0.2.2:8080
    ONLINE_OTT: 123456

jobs:
    resolve:
        name: Resolve test inputs
        runs-on: ubuntu-latest
        outputs:
            apk_name: ${{ steps.nightly.outputs.apk_name }}
            apk_sha256: ${{ steps.nightly.outputs.apk_sha256 }}
            lanes: ${{ steps.lanes.outputs.lanes }}
            release_tag: ${{ steps.nightly.outputs.release_tag }}
        steps:
            - name: Checkout tests
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Resolve online lanes
              id: lanes
              env:
                  BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
                  EVENT_NAME: ${{ github.event_name }}
                  HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
                  REQUESTED_LANE: ${{ inputs.lane || 'all' }}
              run: |
                  if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
                      case "$REQUESTED_LANE" in
                          all) lanes=$(scripts/select-auth-online-lanes.sh --all) ;;
                          account-auth|recovery-password|data-sync) lanes="[\"$REQUESTED_LANE\"]" ;;
                          *) echo "Unknown lane: $REQUESTED_LANE" >&2; exit 2 ;;
                      esac
                  elif [[ "$EVENT_NAME" == "pull_request" ]]; then
                      lanes=$(scripts/select-auth-online-lanes.sh "$BASE_SHA" "$HEAD_SHA")
                  else
                      lanes=$(scripts/select-auth-online-lanes.sh --all)
                  fi
                  if [[ "$(jq length <<< "$lanes")" -eq 0 ]]; then
                      echo "The online workflow ran without selecting an online lane" >&2
                      exit 1
                  fi
                  echo "lanes=$lanes" >> "$GITHUB_OUTPUT"

            - name: Resolve latest Auth nightly
              id: nightly
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  IFS=$'\t' read -r release_tag apk_name apk_sha256 < <(scripts/resolve-auth-nightly.sh)
                  echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
                  echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"
                  echo "apk_sha256=${apk_sha256#sha256:}" >> "$GITHUB_OUTPUT"

    auth-online:
        name: ${{ matrix.lane }}
        needs: resolve
        runs-on: ubuntu-latest
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                lane: ${{ fromJSON(needs.resolve.outputs.lanes) }}
        env:
            AUTH_FIXTURE_COMPOSE_PROJECT: auth-online-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.lane }}
            FIXTURE_MUTATION_TAG: FixturePersisted
            MISSING_EMAIL: missing-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.lane }}@example.org
            ONLINE_CODE_ACCOUNT: first-key-${{ github.run_id }}-${{ github.run_attempt }}@example.org
            ONLINE_EMAIL: auth-ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.lane }}@example.org
        steps:
            - name: Checkout tests
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Set up Java
              uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
              with:
                  distribution: temurin
                  java-version: 17

            - name: Download resolved Auth nightly
              env:
                  APK_NAME: ${{ needs.resolve.outputs.apk_name }}
                  APK_SHA256: ${{ needs.resolve.outputs.apk_sha256 }}
                  AUTH_RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  mkdir -p "$AUTH_APK_DIR"
                  gh release download "$AUTH_RELEASE_TAG" \
                      --repo ente/nightly \
                      --pattern "$APK_NAME" \
                      --pattern SHA256SUMS \
                      --dir "$AUTH_APK_DIR"

                  apk_path="$AUTH_APK_DIR/$APK_NAME"
                  actual_sha256=$(sha256sum "$apk_path" | awk '{print $1}')
                  if [[ "$actual_sha256" != "$APK_SHA256" ]]; then
                      echo "Downloaded Auth APK does not match the resolved release asset" >&2
                      exit 1
                  fi
                  checksum=$(grep -E "^${APK_SHA256}[[:space:]]+\\*?${APK_NAME}$" "$AUTH_APK_DIR/SHA256SUMS")
                  if [[ -z "$checksum" ]]; then
                      echo "SHA256SUMS does not contain the resolved Auth APK" >&2
                      exit 1
                  fi
                  (
                      cd "$AUTH_APK_DIR"
                      printf "%s\n" "$checksum" | sha256sum --check -
                  )

                  echo "AUTH_APK_PATH=$apk_path" >> "$GITHUB_ENV"
                  echo "AUTH_RELEASE_TAG=$AUTH_RELEASE_TAG" >> "$GITHUB_ENV"
                  echo "AUTH_APK_SHA256=$APK_SHA256" >> "$GITHUB_ENV"

            - name: Install pinned Maestro
              run: |
                  curl --fail --location --silent --show-error \
                      "https://github.com/mobile-dev-inc/maestro/releases/download/cli-$MAESTRO_VERSION/maestro.zip" \
                      --output "$RUNNER_TEMP/maestro.zip"
                  echo "$MAESTRO_SHA256  $RUNNER_TEMP/maestro.zip" | sha256sum --check -
                  mkdir -p "$HOME/.maestro"
                  unzip -q "$RUNNER_TEMP/maestro.zip" -d "$HOME/.maestro"
                  maestro_bin="$HOME/.maestro/maestro/bin/maestro"
                  installed_version=$("$maestro_bin" --version)
                  if [[ "$installed_version" != "$MAESTRO_VERSION" ]]; then
                      echo "Expected Maestro $MAESTRO_VERSION, installed $installed_version" >&2
                      exit 1
                  fi
                  echo "$HOME/.maestro/maestro/bin" >> "$GITHUB_PATH"

            - name: Start local Auth backend
              run: ALLOW_AUTH_FIXTURE_RESTORE=1 scripts/fixtures/restore-auth-fixture.sh

            - name: Enable KVM
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

            - name: Prepare private test password
              run: |
                  password="AuthCi-$(openssl rand -hex 10)!"
                  echo "::add-mask::$password"
                  echo "ONLINE_PASSWORD=$password" >> "$GITHUB_ENV"

            - name: Run ${{ matrix.lane }} tests
              id: online-tests
              uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
              with:
                  api-level: 34
                  target: default
                  arch: x86_64
                  profile: pixel_5
                  cores: 4
                  emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -memory 4096
                  disable-animations: true
                  script: .github/scripts/run-auth-online-tests.sh "${{ matrix.lane }}"

            - name: Summarize ${{ matrix.lane }} tests
              if: always() && steps.online-tests.outcome != 'skipped'
              env:
                  TEST_OUTCOME: ${{ steps.online-tests.outcome }}
              run: |
                  if [[ "$TEST_OUTCOME" == "success" ]]; then
                      status="passed"
                      coverage_label="Verified coverage"
                  else
                      status="failed"
                      coverage_label="Planned coverage"
                  fi
                  {
                      echo "### Auth Android ${{ matrix.lane }} $status"
                      echo
                      echo "- Release: \`$AUTH_RELEASE_TAG\`"
                      echo "- Auth APK SHA-256: \`$AUTH_APK_SHA256\`"
                      echo "- Android API: \`34\`"
                      echo "- Maestro: \`$MAESTRO_VERSION\`"
                      echo "- Backend: checked-in public Museum fixture v2"
                      echo
                      echo "#### $coverage_label"
                      echo
                      case "${{ matrix.lane }}" in
                          account-auth)
                              echo "- Live TOTP challenge, synchronized-code visibility, unknown-account error, signup, first Auth-key creation, and cold password login"
                              ;;
                          recovery-password)
                              echo "- Recovery-key password reset and synchronized-code preservation"
                              ;;
                          data-sync)
                              echo "- Prepared password login, active and trashed synchronized codes, account/security settings, and a persisted two-code bulk tag across a cold login"
                              ;;
                      esac
                      echo
                      echo "JUnit results are attached as \`auth-online-${{ matrix.lane }}-results\`."
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload ${{ matrix.lane }} results
              if: always() && steps.online-tests.outcome != 'skipped'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-online-${{ matrix.lane }}-results
                  path: artifacts/maestro/online-results/*.xml
                  if-no-files-found: warn
                  retention-days: 7

            - name: Upload ${{ matrix.lane }} failure diagnostics
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-online-${{ matrix.lane }}-diagnostics
                  path: artifacts/maestro/online-debug
                  if-no-files-found: warn
                  retention-days: 3

            - name: Capture account runtime health
              if: failure() && matrix.lane != 'data-sync'
              run: |
                  mkdir -p artifacts/maestro/runtime-health
                  {
                      date --iso-8601=seconds
                      echo "lane=${{ matrix.lane }}"
                      adb devices -l || true
                      printf 'adb_state='
                      adb get-state || true
                      printf 'app_pid='
                      adb shell pidof "$APP_ID" || true
                      printf 'emulator_processes='
                      pgrep -af 'emulator.*-avd' || true
                      free -h || true
                      df -h || true
                  } > "artifacts/maestro/runtime-health/${{ matrix.lane }}.txt"

            - name: Upload account runtime health
              if: failure() && matrix.lane != 'data-sync'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: auth-online-${{ matrix.lane }}-runtime-health
                  path: artifacts/maestro/runtime-health
                  if-no-files-found: error
                  retention-days: 3

            - name: Show backend status on failure
              if: failure()
              run: docker compose --project-name "$AUTH_FIXTURE_COMPOSE_PROJECT" -f museum/compose.yaml ps

            - name: Stop local Auth backend
              if: always()
              run: docker compose --project-name "$AUTH_FIXTURE_COMPOSE_PROJECT" -f museum/compose.yaml down --volumes --remove-orphans

    auth-online-gate:
        name: Auth online gate
        if: always()
        needs: [resolve, auth-online]
        runs-on: ubuntu-latest
        steps:
            - name: Verify required online lanes
              env:
                  LANE_RESULT: ${{ needs.auth-online.result }}
                  RESOLVE_RESULT: ${{ needs.resolve.result }}
              run: |
                  test "$RESOLVE_RESULT" = success
                  test "$LANE_RESULT" = success
